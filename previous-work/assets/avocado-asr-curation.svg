<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1180" viewBox="0 0 1200 1180" role="img" aria-labelledby="title desc">
  <title id="title">Multilingual Avocado ASR data curation</title>
  <desc id="desc">One audio waveform is segmented by VAD into variable-length segments, sorted by duration ascending, grouped into a short group and a long group each padded to its own longest segment, then one segment is zoomed in and routed through an ensemble of three language identification models, Gemma ASR, and alignment.</desc>
  <defs>
    <style>
      .bg{fill:#f5efe3}
      .panel{fill:#fffaf1;stroke:#171512;stroke-width:3}
      .line{stroke:#171512;stroke-width:3;fill:none;stroke-linecap:round}
      .thin{stroke:#171512;stroke-width:2;fill:none;stroke-linecap:round}
      .clay{fill:#c66c45}.sage{fill:#707d65}.sand{fill:#eadcc8}.ink{fill:#171512}
      .pad{fill:#e7dccb;stroke:#171512;stroke-width:2;stroke-dasharray:5 5}
      .seg{stroke:#171512;stroke-width:2}
      .label{font-family:Arial,Helvetica,sans-serif;font-size:30px;font-weight:700;fill:#171512}
      .h2{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;fill:#171512}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:22px;fill:#625b50}
      .tiny{font-family:Arial,Helvetica,sans-serif;font-size:17px;fill:#625b50}
      .mono{font-family:'Courier New',monospace;font-size:17px;fill:#171512}
      .pill{font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:700;fill:#fffaf1}
      .serif{font-family:Georgia,Times,serif;font-size:64px;font-weight:500;fill:#171512}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#171512"/></marker>
  </defs>

  <rect class="bg" width="1200" height="1180"/>
  <path d="M0 180h1200M0 360h1200M0 540h1200M0 720h1200M0 900h1200M0 1080h1200M200 0v1180M400 0v1180M600 0v1180M800 0v1180M1000 0v1180" stroke="#d8ccbb" stroke-width="1" opacity=".6"/>

  <text x="70" y="96" class="serif">Avocado ASR curation</text>
  <text x="74" y="138" class="small">200M+ hours, 40+ languages, peak 10k GPUs</text>

  <!-- ============ BAND 1 : one wave -> VAD -> segments ============ -->
  <text x="74" y="206" class="h2">1 — VAD segments one recording into speech spans</text>

  <!-- source waveform -->
  <rect x="74" y="226" width="640" height="92" rx="10" class="panel"/>
  <path d="M92 272c10-34 22-34 32 0s22 34 32 0 22-46 32 0 22 30 32 0 22-40 32 0 22 34 32 0 22-26 32 0 22-44 32 0 22 40 32 0 22-30 32 0 22 34 32 0 22-40 32 0 22 30 32 0 22-34 32 0 22 26 32 0 22-44 32 0 22 40 32 0 22-30 32 0" class="line"/>
  <text x="726" y="280" class="small">raw audio</text>

  <!-- VAD chip -->
  <rect x="74" y="330" width="120" height="46" rx="23" class="sage" stroke="#171512" stroke-width="3"/>
  <text x="104" y="361" class="small" fill="#fffaf1">VAD</text>
  <path d="M210 353h40" class="line" marker-end="url(#arrow)"/>

  <!-- raw segments, varied length, in original (unsorted) order; each holds a mini-waveform -->
  <g>
    <rect x="266" y="332" width="70"  height="42" rx="6" class="sand seg"/>
    <path d="M274 353c5-12 11-12 16 0s11 12 16 0 11-14 16 0" class="thin"/>
    <rect x="346" y="332" width="150" height="42" rx="6" class="sand seg"/>
    <path d="M354 353c5-12 11-12 16 0s11 12 16 0 11-16 16 0 11 14 16 0 11-12 16 0 11 14 16 0 11-16 16 0 11 12 16 0" class="thin"/>
    <rect x="506" y="332" width="40"  height="42" rx="6" class="sand seg"/>
    <path d="M512 353c4-10 9-10 13 0s9 12 13 0" class="thin"/>
    <rect x="556" y="332" width="110" height="42" rx="6" class="sand seg"/>
    <path d="M564 353c5-12 11-12 16 0s11 14 16 0 11-16 16 0 11 12 16 0 11-12 16 0" class="thin"/>
    <rect x="676" y="332" width="55"  height="42" rx="6" class="sand seg"/>
    <path d="M683 353c5-12 10-12 15 0s10 12 15 0" class="thin"/>
    <rect x="741" y="332" width="190" height="42" rx="6" class="sand seg"/>
    <path d="M749 353c5-13 11-13 16 0s11 15 16 0 11-16 16 0 11 13 16 0 11-13 16 0 11 15 16 0 11-16 16 0 11 13 16 0 11-12 16 0 11 12 16 0" class="thin"/>
    <rect x="941" y="332" width="48"  height="42" rx="6" class="sand seg"/>
    <path d="M947 353c4-11 9-11 14 0s9 12 14 0" class="thin"/>
    <rect x="999" y="332" width="90"  height="42" rx="6" class="sand seg"/>
    <path d="M1007 353c5-12 10-12 15 0s10 14 15 0 10-14 15 0 10 12 15 0" class="thin"/>
  </g>
  <text x="266" y="398" class="tiny">variable-length speech segments (original order)</text>

  <!-- ============ BAND 2 : sort ascending ============ -->
  <text x="74" y="452" class="h2">2 — Sort segments by duration (ascending)</text>
  <g>
    <rect x="266" y="470" width="40"  height="42" rx="6" class="sand seg"/>
    <path d="M272 491c4-10 9-10 13 0s9 12 13 0" class="thin"/>
    <rect x="316" y="470" width="48"  height="42" rx="6" class="sand seg"/>
    <path d="M322 491c4-11 9-11 14 0s9 12 14 0" class="thin"/>
    <rect x="374" y="470" width="55"  height="42" rx="6" class="sand seg"/>
    <path d="M381 491c5-12 10-12 15 0s10 12 15 0" class="thin"/>
    <rect x="439" y="470" width="70"  height="42" rx="6" class="sand seg"/>
    <path d="M447 491c5-12 11-12 16 0s11 12 16 0 11-14 16 0" class="thin"/>
    <rect x="519" y="470" width="90"  height="42" rx="6" class="sand seg"/>
    <path d="M527 491c5-12 10-12 15 0s10 14 15 0 10-14 15 0 10 12 15 0" class="thin"/>
    <rect x="619" y="470" width="110" height="42" rx="6" class="sand seg"/>
    <path d="M627 491c5-12 11-12 16 0s11 14 16 0 11-16 16 0 11 12 16 0 11-12 16 0" class="thin"/>
    <rect x="739" y="470" width="150" height="42" rx="6" class="clay seg"/>
    <path d="M747 491c5-12 11-12 16 0s11 12 16 0 11-16 16 0 11 14 16 0 11-12 16 0 11 14 16 0 11-16 16 0 11 12 16 0" stroke="#fffaf1" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="899" y="470" width="190" height="42" rx="6" class="clay seg"/>
    <path d="M907 491c5-13 11-13 16 0s11 15 16 0 11-16 16 0 11 13 16 0 11-13 16 0 11 15 16 0 11-16 16 0 11 13 16 0 11-12 16 0 11 12 16 0" stroke="#fffaf1" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <path d="M286 524v18l24 0" class="thin"/>
  <text x="266" y="536" class="tiny">shortest</text>
  <text x="1010" y="536" class="tiny" text-anchor="end">longest</text>

  <!-- ============ BAND 3 : group + pad ============ -->
  <text x="74" y="590" class="h2">3 — Bucket into 2 groups, pad each group to its own longest segment</text>

  <!-- Group A : 6 shorter, padded to group-1 longest -->
  <rect x="74" y="606" width="660" height="150" rx="10" class="panel"/>
  <text x="92" y="636" class="small" fill="#171512">Group 1 · 6 short segments → padded</text>
  <g>
    <!-- left col: real seg (sand) + dashed pad to common width 110 -->
    <rect x="92"  y="650" width="40"  height="20" rx="4" class="sand seg"/><rect x="132" y="650" width="70" height="20" rx="4" class="pad"/>
    <rect x="92"  y="674" width="48"  height="20" rx="4" class="sand seg"/><rect x="140" y="674" width="62" height="20" rx="4" class="pad"/>
    <rect x="92"  y="698" width="55"  height="20" rx="4" class="sand seg"/><rect x="147" y="698" width="55" height="20" rx="4" class="pad"/>
    <!-- right col -->
    <rect x="320" y="650" width="70"  height="20" rx="4" class="sand seg"/><rect x="390" y="650" width="40" height="20" rx="4" class="pad"/>
    <rect x="320" y="674" width="90"  height="20" rx="4" class="sand seg"/><rect x="410" y="674" width="20" height="20" rx="4" class="pad"/>
    <rect x="320" y="698" width="110" height="20" rx="4" class="sand seg"/>
  </g>
  <rect x="470" y="650" width="22" height="20" rx="4" class="pad"/>
  <text x="500" y="666" class="tiny">= padding</text>
  <text x="92" y="744" class="tiny">all padded to group-1 longest → minimal wasted PAD tokens</text>

  <!-- Group B : 2 long, padded to group-2 longest -->
  <rect x="754" y="606" width="335" height="150" rx="10" class="panel"/>
  <text x="772" y="636" class="small" fill="#171512">Group 2 · 2 long segments → padded</text>
  <rect x="772" y="656" width="150" height="24" rx="4" class="clay seg"/><rect x="922" y="656" width="40" height="24" rx="4" class="pad"/>
  <rect x="772" y="690" width="190" height="24" rx="4" class="clay seg"/>
  <text x="772" y="744" class="tiny">padded to group-2 longest segment</text>

  <!-- zoom pointer from Group 1 first segment -->
  <rect x="90" y="648" width="44" height="24" rx="4" fill="none" stroke="#c66c45" stroke-width="3"/>
  <path d="M112 672c0 60 90 60 90 96" stroke="#c66c45" stroke-width="3" fill="none" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="138" y="690" class="tiny" fill="#c66c45">zoom 1st segment</text>

  <!-- ============ BAND 4 : zoom -> LID ============ -->
  <text x="74" y="800" class="h2">4 — Zoom one segment · 3 LID models vote → ensemble language</text>

  <!-- zoomed segment as one whole unit -->
  <rect x="74" y="826" width="300" height="104" rx="10" class="panel"/>
  <text x="92" y="854" class="tiny">one segment (zoomed)</text>
  <rect x="92" y="866" width="264" height="44" rx="6" class="clay seg"/>
  <path d="M100 888c6-14 12-14 18 0s12 16 18 0 12-18 18 0 12 16 18 0 12-14 18 0 12 16 18 0 12-18 18 0 12 14 18 0 12-14 18 0 12 16 18 0 12-16 18 0 12 14 18 0 12-14 18 0" stroke="#fffaf1" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 3 LID models voting -->
  <text x="430" y="854" class="tiny">3 LID models</text>
  <g>
    <rect x="430" y="864" width="150" height="22" rx="11" class="sand seg"/><text x="446" y="881" class="tiny" fill="#171512">model 1 → Hindi</text>
    <rect x="430" y="892" width="150" height="22" rx="11" class="sand seg"/><text x="446" y="909" class="tiny" fill="#171512">model 2 → Hindi</text>
    <rect x="430" y="920" width="150" height="22" rx="11" class="sand seg"/><text x="446" y="937" class="tiny" fill="#171512">model 3 → English</text>
  </g>
  <path d="M374 888h48" class="line" marker-end="url(#arrow)"/>

  <!-- ensemble result -->
  <rect x="640" y="826" width="449" height="104" rx="10" class="panel"/>
  <text x="664" y="854" class="small" fill="#171512">Ensemble vote</text>
  <text x="664" y="890" class="tiny">Hindi 2 / English 1 → majority</text>
  <rect x="664" y="900" width="200" height="36" rx="18" class="ink"/>
  <text x="680" y="925" class="pill">dominant_lid = Hindi</text>
  <path d="M588 903h48" class="line" marker-end="url(#arrow)"/>

  <!-- ============ BAND 5 : ASR (Gemma) -> Alignment ============ -->
  <text x="74" y="990" class="h2">5 — Route segment to ASR, then alignment</text>

  <!-- ASR / Gemma -->
  <rect x="74" y="1008" width="430" height="128" rx="10" class="panel"/>
  <text x="98" y="1040" class="label">ASR</text>
  <rect x="98" y="1058" width="120" height="44" rx="22" class="clay" stroke="#171512" stroke-width="3"/>
  <text x="120" y="1087" class="small" fill="#fffaf1">Gemma</text>
  <path d="M232 1080h28" class="line" marker-end="url(#arrow)"/>
  <text x="272" y="1074" class="mono">transcript:</text>
  <text x="272" y="1098" class="mono">"नमस्ते, hello, …"</text>
  <text x="98" y="1126" class="tiny">language-matched model → written-form text</text>

  <path d="M504 1072h40" class="line" marker-end="url(#arrow)"/>

  <!-- Alignment -->
  <rect x="560" y="1008" width="529" height="128" rx="10" class="panel"/>
  <text x="584" y="1040" class="label">Alignment</text>
  <!-- waveform over text ticks -->
  <path d="M584 1066c6-16 14-16 20 0s14 16 20 0 14-22 20 0 14 14 20 0 14-20 20 0 14 16 20 0 14-12 20 0 14-22 20 0 14 20 20 0 14-14 20 0" class="thin"/>
  <path d="M584 1092h420" class="thin"/>
  <path d="M620 1086v12M704 1086v12M788 1086v12M872 1086v12M956 1086v12" class="thin"/>
  <text x="584" y="1126" class="tiny">word/token ↔ audio timestamps</text>

  <text x="74" y="1166" class="small">Outcome: written-form multilingual ASR pretraining data — length-packed padded batches, ensemble LID, and time-aligned transcripts.</text>
</svg>
