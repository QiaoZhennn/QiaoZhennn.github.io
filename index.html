<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=/previous-work/" />
    <link rel="canonical" href="https://qiaozhennn.github.io/previous-work/" />
    <title>Redirecting to Previous Work</title>
    <style>
      :root {
        color: #171512;
        background: #f5efe3;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(560px, calc(100% - 40px));
        border: 1px solid #302b25;
        border-radius: 8px;
        background: #fffaf1;
        padding: 1.5rem;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", Times, serif;
        font-size: clamp(2rem, 8vw, 4rem);
        font-weight: 500;
        line-height: 1;
      }

      p {
        color: #625b50;
        line-height: 1.5;
      }

      a {
        color: #171512;
        font-weight: 700;
      }
    </style>
    <script>
      window.location.replace("/previous-work/");
    </script>
  </head>
  <body>
    <main>
      <h1>Redirecting</h1>
      <p>
        Taking you to
        <a href="/previous-work/">Zhen Qiao's previous work portfolio</a>.
      </p>
    </main>
  </body>
</html>
